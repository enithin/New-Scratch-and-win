<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iPromax Kochi | Scratch & Win</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --dark: #0f0f0f; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--dark); color: white; font-family: 'Poppins', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; overflow: hidden; }
        
        .card { background: #1a1a1a; padding: 30px; border-radius: 25px; border: 1px solid #333; width: 310px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); text-align: center; }
        input { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid var(--gold); background: #000; color: white; margin-bottom: 15px; text-align: center; font-size: 1.1rem; outline: none; }
        
        #scratch-container { position: relative; width: 320px; height: 320px; border-radius: 20px; border: 2px solid var(--gold); overflow: hidden; display: none; background: #222; }
        canvas { position: absolute; top: 0; left: 0; z-index: 5; touch-action: none; transition: opacity 0.5s ease; }
        #scratch-coin { position: fixed; width: 60px; height: 60px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #eee, #c0c0c0, #888); border: 2px solid #aaa; z-index: 1000; pointer-events: none; display: none; transform: translate(-50%, -50%); }
#scratch-coin {
    pointer-events: none !important; /* This is the most common fix */
    z-index: 9999;
}

#scratch-container {
    z-index: 100;
}

#login-box {
    z-index: 50; /* Ensure this is lower than the scratch container */
}
        .btn { width: 100%; padding: 16px; border: none; border-radius: 50px; font-weight: 700; cursor: pointer; text-transform: uppercase; margin-top: 10px; transition: 0.3s; }
        .btn-gold { background: linear-gradient(45deg, #D4AF37, #F2D388); color: black; }
        .btn-blue { background: #4285F4; color: white; }
        
        #capture-area { background: linear-gradient(135deg, #1a1a1a 0%, #000 100%); padding: 35px 20px; border-radius: 25px; border: 2px solid var(--gold); margin-bottom: 15px; }
        .vibrant-prize { font-size: 2.2rem; font-weight: 800; color: var(--gold); margin: 15px 0; }
    </style>
</head>
<body>
    <div id="scratch-coin"></div>

    <div id="login-box" class="card">
        <img src="logo.png" style="width:140px; margin-bottom:20px;">
        <input type="tel" id="phone" placeholder="Enter Mobile Number" maxlength="10">
        
        <div id="gate-1">
            <p style="font-size: 0.75rem; color: var(--gold); margin-bottom: 10px;">⭐ Step 1: Support us with a review to unlock your gift!</p>
            <button class="btn btn-blue" onclick="unlockReview()">1. WRITE GOOGLE REVIEW ⭐</button>
        </div>

        <div id="gate-2" style="display: none;">
            <div style="font-size: 0.7rem; color: #888; margin-bottom: 10px; display: flex; gap: 5px; align-items: center;">
                <input type="checkbox" id="tcCheck" style="accent-color: var(--gold);"> <span>I accept the T&C of iPromax Kochi</span>
            </div>
            <button class="btn btn-gold" onclick="launch()">2. START SCRATCHING</button>
        </div>
    </div>

    <div id="scratch-container">
        <canvas id="scratchCanvas" width="320" height="320"></canvas>
    </div>

    <div id="claim-box" class="card" style="display:none;">
        <div id="capture-area">
            <img src="logo.png" style="width: 80px; margin-bottom: 10px;">
            <h2 id="wonText" class="vibrant-prize"></h2>
            <div id="idBadge" style="font-family:monospace; color:#888;"></div>
            <div style="font-size: 0.6rem; color: #666; margin-top: 15px;">iPromax Kochi Apple Service Centre</div>
        </div>
        <button class="btn" style="background:#444; color:white;" onclick="downloadPrize()">💾 SAVE TO PHOTOS</button>
        <button class="btn" style="background:#25D366; color:white;" onclick="claim()">CLAIM ON WHATSAPP ✅</button>
    </div>

    <audio id="sfx" src="scratch.mp3" loop></audio>
    <audio id="winSfx" src="win.mp3"></audio>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="script.js"></script>
</body>
</html>

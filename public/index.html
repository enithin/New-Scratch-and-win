<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iPromax Kochi | Scratch & Win</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --dark: #0f0f0f; }
        body { background: var(--dark); color: white; font-family: 'Poppins', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; overflow: hidden; }
        
        /* Coin UI */
        #scratch-coin { position: fixed; width: 60px; height: 60px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #eee, #c0c0c0, #888); border: 2px solid #aaa; box-shadow: 2px 5px 15px rgba(0,0,0,0.5); z-index: 1000; pointer-events: none; display: none; transform: translate(-50%, -50%); }

        /* Containers */
        #login-box, #claim-box { background: #1a1a1a; padding: 30px; border-radius: 25px; border: 1px solid #333; width: 310px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        input { width: 90%; padding: 15px; border-radius: 12px; border: 1px solid var(--gold); background: #000; color: white; margin-bottom: 15px; text-align: center; font-size: 1.1rem; }
        
        #scratch-container { position: relative; width: 320px; height: 320px; border-radius: 20px; border: 2px solid var(--gold); overflow: hidden; display: none; }
        canvas { position: absolute; top: 0; left: 0; z-index: 5; touch-action: none; transition: opacity 0.5s ease; }

        /* Prize Card */
        #capture-area { background: linear-gradient(135deg, #1a1a1a 0%, #000 100%); padding: 35px 20px; border-radius: 25px; border: 2px solid var(--gold); position: relative; }
        .vibrant-prize { font-size: 2.2rem; font-weight: 800; color: var(--gold); text-transform: uppercase; margin: 15px 0; }
        
        /* Buttons */
        .btn { width: 100%; padding: 16px; border: none; border-radius: 50px; font-weight: 700; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        .btn-gold { background: linear-gradient(45deg, #D4AF37, #F2D388); color: black; }
        .btn-blue { background: #4285F4; color: white; }
    </style>
</head>
<body>
    <div id="scratch-coin"></div>

    <div id="login-box">
        <img src="logo.png" style="width:150px; margin-bottom:20px;">
        <input type="tel" id="phone" placeholder="Enter Mobile Number" maxlength="10">
        <button class="btn btn-gold" onclick="launch()">REVEAL GIFT</button>
    </div>

    <div id="scratch-container">
        <div style="position:absolute; width:100%; height:100%; display:flex; align-items:center; justify-content:center; color:#444;">REVEALING...</div>
        <canvas id="scratchCanvas" width="320" height="320"></canvas>
    </div>

    <div id="claim-box" style="display:none;">
        <div id="capture-area">
            <img src="logo.png" style="width: 80px; margin-bottom: 10px;">
            <h2 id="wonText" class="vibrant-prize"></h2>
            <div id="idBadge" style="font-family:monospace; color:#888;"></div>
            <div style="font-size:0.6rem; color:#666; margin-top:15px;">iPromax Kochi Apple Service Centre</div>
        </div>
        <p id="lock-msg" style="font-size: 0.75rem; color: var(--gold); margin-top:10px;">⭐ Step 1: Post a review to unlock</p>
        <button class="btn btn-blue" id="reviewBtn" onclick="review()">1. POST 5-STAR REVIEW ⭐</button>
        <div id="unlocked-actions" style="display: none;">
            <button class="btn" style="background:#444; color:white;" onclick="downloadPrize()">💾 SAVE TO PHOTOS</button>
            <button class="btn" style="background:#25D366; color:white;" onclick="claim()">2. GET ON WHATSAPP ✅</button>
        </div>
    </div>

    <audio id="sfx" src="scratch.mp3" loop></audio>
    <audio id="winSfx" src="win.mp3"></audio>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>iPromax Staff</title>
    <style>
        body { background: #0f0f0f; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .box { background: #1a1a1a; padding: 20px; border-radius: 20px; max-width: 350px; margin: auto; border: 1px solid #333; }
        input { width: 80%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #444; background: #000; color: #fff; }
        .btn { padding: 12px 25px; border-radius: 50px; border: none; background: #D4AF37; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <h2>Staff Portal</h2>
    <div class="box">
        <input type="text" id="codeInp" placeholder="Enter Coupon Code">
        <button class="btn" onclick="check()">VERIFY</button>
        <div id="res" style="margin-top:20px; display:none; padding:15px; border-radius:10px;">
            <h3 id="pTit"></h3>
            <button id="redBtn" class="btn" style="background:white;" onclick="redeem()">REDEEM NOW</button>
        </div>
    </div>

    <script>
        async function check() {
            const val = document.getElementById('codeInp').value;
            const r = await fetch(`/api/staff-action?code=${val}&action=check`);
            const d = await r.json();
            const res = document.getElementById('res');
            res.style.display = 'block';
            if(d.status === "VALID") {
                res.style.background = "#1b5e20";
                document.getElementById('pTit').innerText = `${d.prize} ✅`;
                document.getElementById('redBtn').style.display = "block";
            } else {
                res.style.background = "#b71c1c";
                document.getElementById('pTit').innerText = "ALREADY USED ❌";
                document.getElementById('redBtn').style.display = "none";
            }
        }
        async function redeem() {
            const val = document.getElementById('codeInp').value;
            const r = await fetch(`/api/staff-action?code=${val}&action=redeem`);
            alert("Redemption Logged!");
            location.reload();
            </script>
    
  <div class="container" style="margin-top: 20px; border-color: #444;">
    <button class="btn" style="background: #333; color: #888; font-size: 0.8rem;" onclick="toggleManager()">⚙️ MANAGE CAMPAIGN</button>
    
    <div id="manager-zone" style="display:none; margin-top: 20px; text-align: left;">
        <h4 style="color:var(--gold); border-bottom: 1px solid #333; padding-bottom: 10px;">Update Prize List</h4>
        <div id="prize-inputs">
            </div>
        <button class="btn btn-gold" style="margin-top:10px;" onclick="savePrizes()">Update Live Prizes</button>
    </div>
</div>

<script>
    function toggleManager() {
        const zone = document.getElementById('manager-zone');
        zone.style.display = zone.style.display === 'none' ? 'block' : 'none';
        if(zone.style.display === 'block') loadCurrentPrizes();
    }

    async function loadCurrentPrizes() {
        const r = await fetch(SHEET_CSV_URL); // Use your existing CSV URL
        const text = await r.text();
        const rows = text.split('\n').slice(1);
        const container = document.getElementById('prize-inputs');
        container.innerHTML = '';

        rows.forEach((row, i) => {
            const cols = row.split(',');
            if(!cols[0]) return;
            container.innerHTML += `
                <div style="display:flex; gap:5px; margin-bottom:5px;">
                    <input type="text" value="${cols[0]}" class="p-name" style="flex:2; font-size:0.8rem; padding:8px;">
                    <input type="number" value="${cols[1]}" class="p-weight" style="flex:1; font-size:0.8rem; padding:8px;">
                </div>`;
        });
    }

    async function savePrizes() {
        if(!confirm("This will change the prizes for all new customers. Proceed?")) return;
        
        const names = document.querySelectorAll('.p-name');
        const weights = document.querySelectorAll('.p-weight');
        const data = [];
        
        names.forEach((n, i) => {
            if(n.value) data.push({ name: n.value, weight: weights[i].value });
        });

        const r = await fetch(`/api/staff-action?action=updatePrizes&data=${encodeURIComponent(JSON.stringify(data))}`);
        const res = await r.text();
        if(res.includes("SUCCESS")) {
            alert("iPromax Prize List Updated!");
            location.reload();
        }
    }
</script>
    
</body>
</html>

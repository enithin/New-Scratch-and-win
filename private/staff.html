<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPromax Staff | Management Console</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --bg: #0a0a0a; --card: #161616; --green: #2ecc71; --red: #e74c3c; }
        
        body { background: var(--bg); color: #fff; font-family: 'Poppins', sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; }

        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid #222; padding-bottom: 15px; }
        .logo { width: 100px; filter: grayscale(1) invert(1); }
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px; }
        .stat-card { background: var(--card); padding: 15px; border-radius: 15px; border-left: 4px solid var(--gold); }
        .stat-card small { color: #888; font-size: 0.7rem; text-transform: uppercase; }
        .stat-card div { font-size: 1.4rem; font-weight: 700; color: var(--gold); }

        .main-card { background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid #222; box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-bottom: 30px;}
        h2 { margin-top: 0; font-size: 1.1rem; color: #ccc; }

        .search-box { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; background: #000; border: 1px solid #333; padding: 15px; border-radius: 10px; color: #fff; font-size: 1rem; outline: none; }
        input:focus { border-color: var(--gold); }
        
        .btn { padding: 12px 25px; border-radius: 10px; border: none; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .btn-gold { background: var(--gold); color: #000; }
        .btn-outline { background: transparent; border: 1px solid #444; color: #888; font-size: 0.8rem; }

        /* Result Card Redesign */
        #res { display: none; margin-top: 20px; text-align: left; border-radius: 15px; overflow: hidden; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform: translateY(0); } }
        
        .history-section { margin-top: 40px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.85rem; }
        th { text-align: left; color: #555; padding: 10px; border-bottom: 1px solid #222; }
        td { padding: 15px 10px; border-bottom: 1px solid #1a1a1a; }
        
        .badge { padding: 4px 8px; border-radius: 5px; font-size: 0.7rem; font-weight: 700; }
        .badge-pending { background: rgba(241, 196, 15, 0.1); color: #f1c40f; }
        .badge-claimed { background: rgba(46, 204, 113, 0.1); color: var(--green); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <img src="/logo.png" class="logo" alt="iPromax">
        <button class="btn btn-outline" onclick="location.reload()">🔄 Refresh Console</button>
    </header>

    <div class="stats-grid">
        <div class="stat-card">
            <small>Total Participation</small>
            <div id="stat-total">--</div>
        </div>
        <div class="stat-card">
            <small>Prizes Claimed</small>
            <div id="stat-claimed">--</div>
        </div>
    </div>

    <div class="main-card">
        <h2>Verify Reward ID or Mobile</h2>
        <div class="search-box">
            <input type="text" id="codeInp" placeholder="Enter IPX Code or Mobile...">
            <button class="btn btn-gold" id="verifyBtn" onclick="check()">Verify</button>
        </div>

        <div id="res">
            <div id="statusHeader" style="padding: 12px; text-align: center; font-weight: 700;"></div>
            <div style="background: #222; padding: 20px;">
                <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                    <span style="color: #888; font-size: 0.8rem;">CUSTOMER</span>
                    <span id="resPhone" style="font-weight: 600;">--</span>
                </div>
                <div style="margin-bottom: 20px;">
                    <span style="color: #888; font-size: 0.8rem;">REWARD</span>
                    <div id="pTit" style="font-size: 1.4rem; font-weight: 700; color: var(--gold); margin-top: 5px;"></div>
                </div>
                <div id="actionArea">
                    <button id="redBtn" class="btn btn-gold" style="width: 100%; height: 50px;" onclick="redeem()">MARK AS CLAIMED ✅</button>
                </div>
            </div>
        </div>
    </div>

    <div class="main-card">
        <h2>Live Prize Manager</h2>
        <p style="font-size:0.7rem; color:#888; margin-bottom:15px;">Adjust weights to control winning probability.</p>
        <div id="prize-list">
            <p style="color:#444;">Loading prizes...</p>
        </div>
        <button class="btn btn-outline" style="margin-top:15px; width:100%; border-color:var(--gold); color:var(--gold);" onclick="savePrizes()">💾 Update Prize Logic</button>
    </div>

    <div class="history-section">
        <h2>Recent Activity</h2>
        <div class="main-card" style="padding: 10px; overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>Time</th>
                        <th>Mobile</th>
                        <th>Prize</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="hist"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // --- CONFIGURATION ---
    const scriptURL = "https://script.google.com/macros/s/AKfycbyoF5vN1zS-ZWf0sWwaIMhwfzsUYSSx1xSRAygJyKQAEwbGfu6ObOWGwVcgs86uaoZ8/exec"; 

    window.onload = function() {
        if(scriptURL.includes("PASTE_YOUR")) {
            alert("Please set the scriptURL in the staff.html code!");
        }
        loadDashboard();
        loadPrizes();
    };

    // --- LOGIC: DASHBOARD & HISTORY ---
    async function loadDashboard() {
        try {
            const r = await fetch(`${scriptURL}?action=getHistory`, { redirect: 'follow' });
            const d = await r.json();
            
            document.getElementById('hist').innerHTML = d.map(h => `
                <tr>
                    <td>${new Date(h.time).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</td>
                    <td style="font-family: monospace;">${h.mobile}</td>
                    <td style="color: var(--gold); font-weight: 600;">${h.prize}</td>
                    <td><span class="badge ${h.status === 'CLAIMED' ? 'badge-claimed' : 'badge-pending'}">${h.status}</span></td>
                </tr>
            `).join('');

            document.getElementById('stat-total').innerText = d.length;
            document.getElementById('stat-claimed').innerText = d.filter(x => x.status === 'CLAIMED').length;
        } catch (err) { console.error("History Error:", err); }
    }

    // --- LOGIC: VERIFICATION ---
    async function check() {
        const val = document.getElementById('codeInp').value.trim();
        if(!val) return;
        
        const vBtn = document.getElementById('verifyBtn');
        vBtn.innerText = "...";
        
        try {
            const r = await fetch(`${scriptURL}?code=${val}&action=check`, { redirect: 'follow' });
            const d = await r.json();
            const res = document.getElementById('res');
            const sH = document.getElementById('statusHeader');
            
            vBtn.innerText = "Verify";
            res.style.display = 'block';

            if(d.status === "VALID") {
                sH.style.background = "var(--green)";
                sH.style.color = "#000";
                sH.innerText = "VERIFIED REWARD";
                document.getElementById('resPhone').innerText = d.mobile;
                document.getElementById('pTit').innerText = d.prize;
                document.getElementById('actionArea').style.display = "block";
            } else {
                sH.style.background = "var(--red)";
                sH.style.color = "#fff";
                sH.innerText = d.message || "NOT FOUND";
                document.getElementById('resPhone').innerText = val;
                document.getElementById('pTit').innerText = "---";
                document.getElementById('actionArea').style.display = "none";
            }
        } catch (err) { alert("Connection error. Ensure Apps Script is set to 'Anyone'."); }
    }

    // --- LOGIC: REDEEM ---
    async function redeem() {
        const val = document.getElementById('codeInp').value.trim();
        const rBtn = document.getElementById('redBtn');
        rBtn.innerText = "Syncing...";
        
        try {
            await fetch(`${scriptURL}?code=${val}&action=redeem`, { redirect: 'follow' });
            alert("Redemption Successful!");
            location.reload();
        } catch (err) { alert("Redeem Failed."); rBtn.innerText = "Mark as Claimed ✅"; }
    }

    // --- LOGIC: PRIZE MANAGEMENT ---
   async function loadPrizes() {
    const container = document.getElementById('prize-list');
    try {
        const res = await fetch(`${scriptURL}?action=getPrizes`, { 
            method: 'GET',
            redirect: 'follow' 
        });
        
        const prizes = await res.json();
        
        // If the sheet is empty or tab is missing
        if (!Array.isArray(prizes) || prizes.length === 0) {
            container.innerHTML = `
                <div style="padding:15px; border:1px dashed #444; color:#888; text-align:center;">
                    No prizes found in 'Prizes' tab. <br>
                    <button class="btn btn-outline" style="margin-top:10px;" onclick="addNewPrizeRow()">+ Add First Prize</button>
                </div>`;
            return;
        }
        
        container.innerHTML = prizes.map((p, i) => `
            <div class="prize-row" style="display:flex; gap:10px; margin-bottom:10px;">
                <input type="text" value="${p.name}" class="p-name" style="flex:2; padding:10px; background:#000; border:1px solid #333; color:#fff; border-radius:8px;">
                <input type="number" value="${p.weight}" class="p-weight" style="flex:1; padding:10px; background:#000; border:1px solid #333; color:var(--gold); border-radius:8px;">
            </div>
        `).join('') + `<button class="btn btn-outline" style="width:100%; font-size:0.7rem;" onclick="addNewPrizeRow()">+ Add Row</button>`;

    } catch (err) {
        container.innerHTML = `<p style="color:var(--red)">Connection Error. Check your scriptURL.</p>`;
    }
}

// Add this helper function to your script
function addNewPrizeRow() {
    const container = document.getElementById('prize-list');
    const newRow = document.createElement('div');
    newRow.className = "prize-row";
    newRow.style = "display:flex; gap:10px; margin-bottom:10px;";
    newRow.innerHTML = `
        <input type="text" class="p-name" style="flex:2; padding:10px; background:#000; border:1px solid #333; color:#fff; border-radius:8px;" placeholder="New Prize">
        <input type="number" class="p-weight" style="flex:1; padding:10px; background:#000; border:1px solid #333; color:var(--gold); border-radius:8px;" value="1">
    `;
    container.insertBefore(newRow, container.lastChild);
}
    async function savePrizes() {
        const names = document.querySelectorAll('.p-name');
        const weights = document.querySelectorAll('.p-weight');
        let data = [];
        names.forEach((n, i) => { if(n.value) data.push([n.value, weights[i].value || 1]); });

        try {
            const res = await fetch(`${scriptURL}?action=updatePrizes&data=${encodeURIComponent(JSON.stringify(data))}`, { redirect: 'follow' });
            if(res.ok) { alert("Prize list updated!"); location.reload(); }
        } catch (err) { alert("Update failed."); }
    }
</script>

</body>
</html>

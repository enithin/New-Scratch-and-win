<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPromax Staff | Management Console</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --bg: #0a0a0a; --card: #161616; --green: #2ecc71; --red: #e74c3c; }
        
        body { background: var(--bg); color: #fff; font-family: 'Poppins', sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; }

        /* Header & Stats Section */
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid #222; padding-bottom: 15px; }
        .logo { width: 100px; filter: grayscale(1) invert(1); }
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px; }
        .stat-card { background: var(--card); padding: 15px; border-radius: 15px; border-left: 4px solid var(--gold); }
        .stat-card small { color: #888; font-size: 0.7rem; text-transform: uppercase; }
        .stat-card div { font-size: 1.4rem; font-weight: 700; color: var(--gold); }

        /* Main Verification Area */
        .main-card { background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid #222; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { margin-top: 0; font-size: 1.1rem; color: #ccc; }

        .search-box { position: relative; display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; background: #000; border: 1px solid #333; padding: 15px; border-radius: 10px; color: #fff; font-size: 1rem; outline: none; }
        input:focus { border-color: var(--gold); }
        
        .btn { padding: 12px 25px; border-radius: 10px; border: none; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .btn-gold { background: var(--gold); color: #000; }
        .btn-outline { background: transparent; border: 1px solid #444; color: #888; font-size: 0.8rem; }

        /* Verification Result */
        #res { display: none; margin-top: 20px; padding: 20px; border-radius: 12px; text-align: center; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform: translateY(0); } }
        
        /* Activity Table */
        .history-section { margin-top: 40px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.85rem; }
        th { text-align: left; color: #555; padding: 10px; border-bottom: 1px solid #222; }
        td { padding: 15px 10px; border-bottom: 1px solid #1a1a1a; }
        
        .badge { padding: 4px 8px; border-radius: 5px; font-size: 0.7rem; font-weight: 700; }
        .badge-pending { background: rgba(241, 196, 15, 0.1); color: #f1c40f; }
        .badge-claimed { background: rgba(46, 204, 113, 0.1); color: var(--green); }
    </style>
</head>
<body onload="loadDashboard()">

<div class="container">
    <header>
        <img src="/logo.png" class="logo">
        <button class="btn btn-outline" onclick="exportCSV()">Export Leads</button>
    </header>

    <div class="stats-grid">
        <div class="stat-card">
            <small>Total Rewards</small>
            <div id="stat-total">--</div>
        </div>
        <div class="stat-card">
            <small>Claimed Today</small>
            <div id="stat-claimed">--</div>
        </div>
    </div>

    <div class="main-card">
        <h2>Verify Reward ID</h2>
        <div class="search-box">
            <input type="text" id="codeInp" placeholder="Enter IPX Code or Mobile Number...">
            <button class="btn btn-gold" onclick="check()">Verify</button>
        </div>

        <div id="res" style="display: none; margin-top: 20px; text-align: left; border-radius: 15px; overflow: hidden;">
    <div id="statusHeader" style="padding: 15px; text-align: center; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;"></div>
    
    <div style="background: #222; padding: 20px;">
        <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
            <span style="color: #888; font-size: 0.8rem;">CUSTOMER MOBILE</span>
            <span id="resPhone" style="font-weight: 600;">--</span>
        </div>
        <div style="margin-bottom: 20px;">
            <span style="color: #888; font-size: 0.8rem;">UNCLAIMED PRIZE</span>
            <div id="pTit" style="font-size: 1.5rem; font-weight: 700; color: var(--gold); margin-top: 5px;"></div>
        </div>

        <div id="actionArea">
             <button id="redBtn" class="btn btn-gold" style="width: 100%; height: 50px;" onclick="redeem()">CONFIRM & MARK AS CLAIMED</button>
        </div>
    </div>
</div>

    <div class="history-section">
        <h2>Recent Activity</h2>
        <div class="main-card" style="padding: 10px;">
            <table>
                <thead>
                    <tr>
                        <th>Time</th>
                        <th>Mobile</th>
                        <th>Prize</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="hist">
                    </tbody>
            </table>
        </div>
    </div>
</div>

    <div class="history-section" style="margin-top: 40px;">
    <h2>Live Prize Manager</h2>
    <div class="main-card">
        <p style="font-size:0.75rem; color:#888; margin-bottom:15px;">Adjust prize names and winning weights (Higher weight = Higher chance).</p>
        <div id="prize-list">
            </div>
        <button class="btn btn-outline" style="margin-top:15px; width:100%; border-color:var(--gold); color:var(--gold);" onclick="savePrizes()">💾 Save Prize Changes</button>
    </div>
</div>

<script>
    async function loadPrizes() {
    const res = await fetch('/api/staff-action?action=getPrizes');
    const prizes = await res.json();
    const container = document.getElementById('prize-list');
    
    container.innerHTML = prizes.map((p, i) => `
        <div class="prize-row" style="display:flex; gap:10px; margin-bottom:10px;">
            <input type="text" value="${p.name}" class="p-name" style="flex:2; padding:8px;" placeholder="Prize Name">
            <input type="number" value="${p.weight}" class="p-weight" style="flex:1; padding:8px;" placeholder="Weight">
        </div>
    `).join('');
}

async function savePrizes() {
    const names = document.querySelectorAll('.p-name');
    const weights = document.querySelectorAll('.p-weight');
    let data = [];
    
    names.forEach((n, i) => {
        if(n.value) data.push([n.value, weights[i].value || 1]);
    });

    const res = await fetch(`/api/staff-action?action=updatePrizes&data=${JSON.stringify(data)}`);
    if(res.ok) {
        alert("Prizes updated successfully!");
        location.reload();
    }
}

// Update your window.onload to include loadPrizes()
window.onload = function() {
    loadDashboard();
    loadPrizes();
};
</script>
<script>
    async function loadDashboard() {
        const r = await fetch(`/api/staff-action?action=getHistory`);
        const d = await r.json();
        
        // Update Table
        document.getElementById('hist').innerHTML = d.map(h => `
            <tr>
                <td>${h.time}</td>
                <td style="font-family: monospace;">${h.mobile}</td>
                <td style="color: var(--gold); font-weight: 600;">${h.prize}</td>
                <td><span class="badge ${h.status === 'CLAIMED' ? 'badge-claimed' : 'badge-pending'}">${h.status}</span></td>
            </tr>
        `).join('');

        // Update Stats
        document.getElementById('stat-total').innerText = d.length;
        document.getElementById('stat-claimed').innerText = d.filter(x => x.status === 'CLAIMED').length;
    }

   async function check() {
    const val = document.getElementById('codeInp').value.trim();
    if(!val) return;
    
    const btn = document.querySelector('.btn-gold');
    btn.innerText = "Searching...";
    
    // We must use a proxy or a direct URL with correct headers
    // For Google Apps Script, the 'redirect: follow' is the secret.
    try {
        const response = await fetch(`${scriptURL}?code=${val}&action=check`, {
            method: 'GET',
            mode: 'cors', // If this fails, your Deployment 'Who has access' is not 'Anyone'
            redirect: 'follow'
        });

        const d = await response.json();
        const res = document.getElementById('res');
        const sH = document.getElementById('statusHeader');
        
        btn.innerText = "Verify";
        res.style.display = 'block';

        if(d.status === "VALID") {
            sH.style.background = "var(--green)";
            sH.style.color = "#000";
            sH.innerText = "Verified Prize Found";
            document.getElementById('resPhone').innerText = d.mobile;
            document.getElementById('pTit').innerText = d.prize;
            document.getElementById('actionArea').style.display = "block";
        } else {
            sH.style.background = "var(--red)";
            sH.style.color = "#fff";
            sH.innerText = d.message || "Invalid Code";
            document.getElementById('actionArea').style.display = "none";
        }
    } catch (err) {
        console.error(err);
        alert("STILL BLOCKED: 1. Check if Deployment is set to 'Anyone'. 2. Make sure you updated the scriptURL to the one ending in /exec.");
    }
}
    async function redeem() {
        const val = document.getElementById('codeInp').value;
        await fetch(`/api/staff-action?code=${val}&action=redeem`);
        alert("Success! Prize marked as claimed.");
        location.reload();
    }

    async function exportCSV() {
        const c = await (await fetch('/api/config')).json();
        window.open(c.sheet, '_blank');
    }
</script>

</body>
</html>
